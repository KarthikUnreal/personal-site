<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>contact me here pls</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --bg-card:  #16213e;
      --bg-card-h:#1a2a42;
      --ink:      #cdd6f4;
      --ink-soft: #7f849c;
      --ink-dim:  #313244;
      --accent:   #89b4fa;
      --green:    #a6e3a1;
      --mono:     'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      background-image: linear-gradient(135deg, #0f0f1a 0%, #0d1b2a 30%, #1a0a2e 60%, #0a1f0f 100%);
      background-attachment: fixed;
      color: var(--ink);
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Nav ── */
    nav {
      border-bottom: 1px solid var(--ink-dim);
      background: rgba(15,15,26,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 18px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      font-size: 14px;
      font-weight: 400;
      color: var(--ink);
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 32px;
    }
    .nav-links a {
      font-size: 13px;
      color: var(--ink-soft);
      transition: color .15s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--ink); }

    /* ── Layout ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 48px 120px;
    }

    /* ── Page header ── */
    .page-title {
      font-size: 28px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 16px;
    }
    hr {
      border: none;
      border-top: 1px solid var(--ink-dim);
      margin-bottom: 32px;
    }

    /* ── Fade in ── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }
    .fade { opacity: 0; animation: rise .5s ease forwards; }
    .d1 { animation-delay: .05s; }
    .d2 { animation-delay: .15s; }
    .d3 { animation-delay: .25s; }
    .d4 { animation-delay: .35s; }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--ink-dim);
      border-radius: 4px;
      padding: 20px 22px 24px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .card:hover {
      background: var(--bg-card-h);
      border-color: var(--accent);
    }
    .card-date {
      font-size: 11px;
      color: var(--ink-soft);
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.5;
    }

    /* ── About / Contact prose ── */
    .prose p {
      color: var(--ink-soft);
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.75;
    }
    .prose p strong { color: var(--ink); font-weight: 400; }

    .detail-grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px 0;
      margin-top: 28px;
    }
    .dk { color: var(--ink-dim); font-size: 12px; }
    .dv { color: var(--ink-soft); font-size: 12px; }
    .dv a { color: var(--accent); border-bottom: 1px solid transparent; transition: border-color .15s; }
    .dv a:hover { border-color: var(--accent); }

    /* ── Footer ── */
    footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--ink-dim);
      font-size: 12px;
      color: var(--ink-dim);
    }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10,10,20,0.97);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      max-width: 680px;
      width: 100%;
      padding: 56px 48px 100px;
      transform: translateY(12px);
      transition: transform .25s ease;
    }
    .modal-backdrop.open .modal { transform: none; }

    .modal-topbar {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--ink-dim);
      margin-bottom: 40px;
    }
    .modal-nav { display: flex; gap: 20px; }
    .modal-nav span, .modal-close { cursor: pointer; transition: color .15s; }
    .modal-nav span:hover, .modal-close:hover { color: var(--ink); }
    .modal-nav span.dimmed { opacity: 0.25; pointer-events: none; }

    .modal-date { font-size: 11px; color: var(--ink-soft); margin-bottom: 8px; }
    .modal-title { font-size: 20px; color: var(--ink); margin-bottom: 32px; line-height: 1.4; }
    .modal-body { font-size: 14px; line-height: 1.85; color: var(--ink-soft); }
    .modal-body p + p { margin-top: 18px; }

    @media (max-width: 600px) {
      .nav-inner, main { padding-left: 20px; padding-right: 20px; }
      .card-grid { grid-template-columns: 1fr; }
      .modal { padding: 40px 20px 80px; }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--ink-dim); }
</style>
</head>
